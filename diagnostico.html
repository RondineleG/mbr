<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico MrBur</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0806;
  --gold: #C9A84C;
  --tx: #F0E6D0;
}
body {
  background: var(--bg); color: var(--tx);
  font-family: 'Cormorant Garamond', Georgia, serif;
  padding: 20px; max-width: 800px; margin: 0 auto;
}
h1 { font-family: 'Cinzel', serif; color: var(--gold); }
.console-log {
  background: #141210; border: 1px solid #2a2418;
  padding: 15px; margin: 10px 0; font-family: 'Share Tech Mono', monospace;
  font-size: 12px; max-height: 400px; overflow-y: auto;
}
.error { color: #ff6b6b; }
.success { color: #51cf66; }
.info { color: #74c0fc; }
.btn {
  background: var(--gold); color: var(--bg);
  border: none; padding: 10px 20px; cursor: pointer;
  font-family: 'Cinzel', serif; font-weight: 600;
  margin: 5px;
}
</style>
</head>
<body>
<h1>🔍 Diagnóstico MrBur</h1>
<div id="status">
<p>Verificando componentes...</p>
</div>
<div class="console-log" id="console"></div>
<button class="btn" onclick="testLoading()">Testar Loading</button>
<button class="btn" onclick="testLogin()">Testar Login</button>
<button class="btn" onclick="clearConsole()">Limpar Console</button>

<script>
const consoleEl = document.getElementById('console');
const statusEl = document.getElementById('status');

function log(msg, type = 'info') {
  const div = document.createElement('div');
  div.className = type;
  div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  consoleEl.appendChild(div);
  consoleEl.scrollTop = consoleEl.scrollHeight;
}

function clearConsole() {
  consoleEl.innerHTML = '';
}

function testLoading() {
  log('Iniciando teste de loading...', 'info');
  
  // Verificar se elementos existem
  const loadingScreen = document.getElementById('loading-screen');
  if (!loadingScreen) {
    log('❌ Elemento loading-screen não encontrado', 'error');
    return;
  }
  log('✅ Elemento loading-screen encontrado', 'success');
  
  // Verificar canvas
  const cvLoad = document.getElementById('cvLoad');
  if (!cvLoad) {
    log('❌ Canvas cvLoad não encontrado', 'error');
    return;
  }
  log('✅ Canvas cvLoad encontrado', 'success');
  
  // Verificar contexto
  try {
    const ctx = cvLoad.getContext('2d');
    if (!ctx) {
      log('❌ Não foi possível obter contexto 2D', 'error');
      return;
    }
    log('✅ Contexto 2D obtido com sucesso', 'success');
  } catch (e) {
    log(`❌ Erro ao obter contexto: ${e.message}`, 'error');
  }
  
  // Verificar funções
  if (typeof window.completeLoadingScreen === 'function') {
    log('✅ Função completeLoadingScreen disponível', 'success');
  } else {
    log('⚠️ Função completeLoadingScreen não disponível', 'error');
  }
}

function testLogin() {
  log('Iniciando teste de login...', 'info');
  
  const loginOverlay = document.getElementById('loginOverlay');
  if (!loginOverlay) {
    log('❌ Elemento loginOverlay não encontrado', 'error');
    return;
  }
  log('✅ Elemento loginOverlay encontrado', 'success');
  
  if (loginOverlay.classList.contains('hidden')) {
    log('⚠️ Login está oculto (classe hidden)', 'info');
  } else {
    log('✅ Login está visível', 'success');
  }
}

// Diagnóstico inicial
window.onload = function() {
  log('🚀 Página carregada', 'success');
  log(`📱 User Agent: ${navigator.userAgent}`, 'info');
  log(`📐 Tela: ${window.innerWidth}x${window.innerHeight}`, 'info');
  
  // Verificar elementos principais
  const elements = ['loading-screen', 'cvLoad', 'cvGrain', 'loginOverlay'];
  elements.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      log(`✅ Elemento #${id} encontrado`, 'success');
    } else {
      log(`❌ Elemento #${id} NÃO encontrado`, 'error');
    }
  });
  
  // Verificar fonts
  document.fonts.ready.then(() => {
    log('✅ Fonts carregadas', 'success');
  });
  
  // Verificar canvas
  const cvLoad = document.getElementById('cvLoad');
  if (cvLoad) {
    try {
      cvLoad.width = window.innerWidth;
      cvLoad.height = window.innerHeight;
      const ctx = cvLoad.getContext('2d');
      ctx.fillStyle = '#C9A84C';
      ctx.fillRect(50, 50, 100, 50);
      log('✅ Canvas teste desenhado com sucesso', 'success');
    } catch (e) {
      log(`❌ Erro no canvas: ${e.message}`, 'error');
    }
  }
};
</script>
</body>
</html>
