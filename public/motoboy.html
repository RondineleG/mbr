<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBur — Central de Entregas</title>
<script>
  try { document.documentElement.setAttribute("data-theme", localStorage.getItem("admin-theme") === "light" ? "light" : "dark"); } catch (e) {}
</script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin">

<div id="motoLoading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--t2)">Verificando acesso…</div>

<div id="motoShell" style="display:none">
  <header class="admin-topbar">
    <div class="admin-brand">🛵 <span>Central de Entregas</span></div>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="motoWho" class="admin-title-sub"></span>
      <button class="admin-btn sm ghost" data-action="moto-theme">🌓</button>
      <button class="admin-btn sm danger" data-action="moto-logout">Sair</button>
    </div>
  </header>

  <main style="padding:16px;max-width:760px;margin:0 auto">
    <div class="moto-summary" id="motoSummary"></div>
    <div class="admin-head" style="margin-top:8px"><div><div class="admin-title">Entregas em rota</div><div class="admin-title-sub">ATUALIZA EM TEMPO REAL</div></div></div>
    <div id="motoActive"></div>
    <div class="admin-head" style="margin-top:20px"><div><div class="admin-title">Concluídas</div><div class="admin-title-sub">HISTÓRICO RECENTE</div></div></div>
    <div id="motoDone"></div>
  </main>
</div>

<script type="module" src="js/motoboy/motoboy.js"></script>
</body>
</html>
