<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrBur — Versão Web</title>
<script>
  try { document.documentElement.setAttribute("data-theme", localStorage.getItem("admin-theme") === "light" ? "light" : "dark"); } catch (e) {}
</script>
<link rel="icon" type="image/png" href="/favicon-flame.png?v=133">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/web.css">
</head>
<body class="web">

<div id="webLoading" class="web-loader">
  <div class="al-radar"><span class="al-emoji">🖥️</span></div>
  <div class="al-text">Carregando versão web…</div>
  <div class="al-sub">MRBUR · DESKTOP</div>
</div>

<div id="webBlocked" class="web-blocked" style="display:none">
  <div class="wb-icon">🔒</div>
  <div class="wb-title">Versão Web desativada</div>
  <div class="wb-sub">O administrador desativou esta página. Ative em Admin → Funcionalidades.</div>
  <a class="web-btn" href="/admin.html">Voltar ao painel</a>
</div>

<!-- ═══ SHELL DESKTOP: sidebar + conteúdo ═══ -->
<div id="webApp" class="web-app" style="display:none">
  <aside class="web-side">
    <div class="web-side-brand"><span class="web-flame">🔥</span><div><b>MRBUR</b><small>VERSÃO WEB</small></div></div>
    <nav class="web-side-nav" id="webNav"></nav>
    <div class="web-side-foot">
      <div class="web-side-user"><span class="web-side-avatar" id="webAvatar">A</span><div><b id="webWho">—</b><small id="webRole">agente</small></div></div>
      <a class="web-btn ghost block" id="webAdminLink" href="/admin.html" style="display:none">Painel admin</a>
      <button class="web-btn danger block" id="webLogout">Sair</button>
    </div>
  </aside>

  <main class="web-content">
    <header class="web-topbar"><h1 id="webTitle">Início</h1><div class="web-top-chip" id="webChip"></div></header>
    <div id="webSection"></div>
  </main>
</div>

<script type="module" src="js/web/web.js"></script>
</body>
</html>
